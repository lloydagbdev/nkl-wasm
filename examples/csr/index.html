<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>nkl-wasm CSR reference</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      body {
        margin: 0;
        background: #f3f4f6;
        color: #111827;
      }
      main {
        max-width: 46rem;
        margin: 3rem auto;
        padding: 1.5rem;
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 0.75rem;
      }
      .placeholder,
      .status {
        padding: 0.9rem;
        border-radius: 0.5rem;
      }
      .placeholder {
        background: #e5e7eb;
      }
      .status {
        background: #dcfce7;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #111827;
          color: #f9fafb;
        }
        main {
          background: #1f2937;
          border-color: #374151;
        }
        .placeholder {
          background: #111827;
        }
        .status {
          background: #166534;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>CSR reference path</h1>
      <p class="placeholder">
        This page ships only a static shell. The list below is not in the HTML yet; Wasm fetches and renders it after boot.
      </p>
      <p id="status" class="status">Booting…</p>
      <p>
        <label for="filter-input">Filter items</label>
        <input id="filter-input" type="text" placeholder="Type to filter" disabled>
      </p>
      <div id="items">No items yet.</div>
    </main>
    <script type="module" src="./app.js"></script>
  </body>
  </html>
